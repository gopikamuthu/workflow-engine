<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Workflow Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f6;--bg2:#ffffff;--bg3:#f1f0ec;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9b9a95;
  --border:#e0ded8;--border2:#cccac4;
  --blue:#1a56db;--blue-bg:#eef3fd;--blue-text:#1e429f;
  --green:#057a55;--green-bg:#edfcf2;--green-text:#014737;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-text:#78350f;
  --red:#e02424;--red-bg:#fdf2f2;--red-text:#771d1d;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column}
.logo{padding:18px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--text)}
.logo svg{width:20px;height:20px;flex-shrink:0}
.nav-item{padding:10px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px;color:var(--text2);border-left:2px solid transparent;transition:all .12s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--text);font-weight:500}
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:10}
.topbar h2{font-size:15px;font-weight:600}
.content{padding:20px}
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:13px;background:var(--bg2);color:var(--text);transition:all .12s;font-family:inherit}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--text);color:var(--bg2);border-color:var(--text)}
.btn-primary:hover{opacity:.85;background:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{border-color:#fca5a5;color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
th{text-align:left;padding:10px 14px;background:var(--bg3);font-weight:500;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border);width:640px;max-width:95vw;max-height:90vh;overflow:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:5}
.modal-header h3{font-size:15px;font-weight:600}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg2)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.step-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;background:var(--bg3)}
.rule-grid{display:grid;grid-template-columns:56px 1fr 1fr 28px;gap:8px;align-items:center;margin-bottom:6px}
.schema-grid{display:grid;grid-template-columns:1fr 100px 90px 1fr 28px;gap:8px;align-items:center;margin-bottom:6px}
.chip{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:monospace}
.exec-step{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--bg3)}
.exec-step.done{border-color:#a7f3d0;background:var(--green-bg)}
.exec-step.failed{border-color:#fca5a5;background:var(--red-bg)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dot-done{background:var(--green)}
.dot-failed{background:var(--red)}
.dot-pending{background:var(--text3)}
.rule-eval{font-size:11px;font-family:monospace;padding:2px 0;display:flex;align-items:center;gap:5px;color:var(--text2)}
.rule-eval.matched{color:var(--green)}
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.api-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-family:monospace;font-weight:600;margin-right:6px}
.method-get{background:#dbeafe;color:#1e3a8a}
.method-post{background:#d1fae5;color:#064e3b}
.method-put{background:#fef3c7;color:#78350f}
.method-delete{background:#fee2e2;color:#7f1d1d}
.api-endpoint{padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;font-size:12px;font-family:monospace;display:flex;align-items:center}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}
.alert-error{background:var(--red-bg);color:var(--red-text);border:1px solid #fca5a5}
.alert-success{background:var(--green-bg);color:var(--green-text);border:1px solid #6ee7b7}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.sum-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.sum-val{font-size:18px;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Workflow Engine
    </div>
    <div class="nav-item active" onclick="showPage('workflows')" id="nav-workflows">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Workflows
    </div>
    <div class="nav-item" onclick="showPage('executions')" id="nav-executions">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Executions
    </div>
    <div class="nav-item" onclick="showPage('audit')" id="nav-audit">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Audit Log
    </div>
    <div class="nav-item" onclick="showPage('api')" id="nav-api">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      API Docs
    </div>
  </div>
  <div class="main" id="main"></div>
</div>
<div id="modal-root"></div>

<script>
const API = 'http://localhost:3000';
let page = 'workflows';
let searchQ = '';
let editWf = null;

async function api(method, path, body) {
  try {
    const res = await fetch(API + path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Request failed: ' + res.status);
    }
    return await res.json();
  } catch (e) {
    if (e.message.includes('fetch')) throw new Error('Cannot connect to API. Is the server running on port 3000?');
    throw e;
  }
}

function showPage(p) {
  page = p;
  ['workflows','executions','audit','api'].forEach(n => {
    document.getElementById('nav-' + n).classList.toggle('active', n === p);
  });
  render();
}

async function render() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="content"><div class="empty">Loading…</div></div>';
  try {
    if (page === 'workflows')  await renderWorkflows(main);
    if (page === 'executions') await renderExecutions(main);
    if (page === 'audit')      await renderAudit(main);
    if (page === 'api')        renderApiDocs(main);
  } catch (e) {
    main.innerHTML = `<div class="content"><div class="alert alert-error">${e.message}</div></div>`;
  }
}

// ─── WORKFLOWS PAGE ─────────────────────────────────────────────────────────
async function renderWorkflows(main) {
  const data = await api('GET', '/workflows?search=' + encodeURIComponent(searchQ));
  const wfs = data.data || [];

  main.innerHTML = `
  <div class="topbar">
    <h2>Workflows</h2>
    <div style="display:flex;gap:8px">
      <input style="width:200px" placeholder="Search workflows…" value="${searchQ}" oninput="searchQ=this.value;render()">
      <button class="btn btn-primary btn-sm" onclick="openCreate()">+ New Workflow</button>
    </div>
  </div>
  <div class="content">
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Steps</th><th>Version</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${wfs.length === 0 ? `<tr><td colspan="6"><div class="empty">No workflows found</div></td></tr>` : ''}
        ${wfs.map(w => `
        <tr>
          <td><span class="chip">${w.id}</span></td>
          <td style="font-weight:500">${w.name}</td>
          <td>${w.step_count || 0}</td>
          <td>v${w.version}</td>
          <td><span class="badge ${w.is_active ? 'badge-green' : 'badge-gray'}">${w.is_active ? 'Active' : 'Inactive'}</span></td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-sm" onclick="openEdit('${w.id}')">Edit</button>
            <button class="btn btn-sm btn-primary" onclick="openExecute('${w.id}')">Execute</button>
            <button class="btn btn-sm btn-danger" onclick="deleteWf('${w.id}')">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div style="margin-top:10px;font-size:12px;color:var(--text2)">Total: ${data.total} workflows</div>
  </div>`;
}

// ─── CREATE / EDIT WORKFLOW ──────────────────────────────────────────────────
function openCreate() {
  editWf = { id: null, name: '', is_active: true, input_schema: [], steps: [], rules: [] };
  renderWfModal('Create Workflow', 'info');
}
async function openEdit(id) {
  const wf = await api('GET', '/workflows/' + id);
  editWf = JSON.parse(JSON.stringify(wf));
  renderWfModal('Edit: ' + wf.name, 'info');
}

function renderWfModal(title, activeTab) {
  const w = editWf;
  openModal(`
  <div class="modal">
    <div class="modal-header">
      <h3>${title}</h3>
      <button class="btn btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        ${['info','steps','rules'].map(t => `<div class="tab ${activeTab===t?'active':''}" onclick="switchTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('')}
      </div>
      ${activeTab==='info'  ? renderInfoTab(w)  : ''}
      ${activeTab==='steps' ? renderStepsTab(w) : ''}
      ${activeTab==='rules' ? renderRulesTab(w) : ''}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWf()">Save</button>
    </div>
  </div>`);
}

function renderInfoTab(w) {
  return `
  <div class="form-group"><label>Workflow Name *</label><input id="wf-name" value="${w.name}" oninput="editWf.name=this.value" placeholder="e.g. Expense Approval"></div>
  <div class="form-group"><label>Status</label>
    <select onchange="editWf.is_active=this.value==='true'">
      <option value="true"  ${w.is_active ? 'selected' : ''}>Active</option>
      <option value="false" ${!w.is_active ? 'selected' : ''}>Inactive</option>
    </select>
  </div>
  <div class="form-group">
    <label>Input Schema <button class="btn btn-sm" style="float:right;margin-top:-4px" onclick="editWf.input_schema.push({field:'',type:'string',required:false,allowed_values:[]});renderWfModal(document.querySelector('.modal-header h3').textContent,'info')">+ Field</button></label>
    ${(w.input_schema||[]).map((f,i) => `
    <div class="schema-grid">
      <input value="${f.field}" placeholder="field name" oninput="editWf.input_schema[${i}].field=this.value">
      <select onchange="editWf.input_schema[${i}].type=this.value">
        ${['string','number','boolean'].map(t=>`<option ${f.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <select onchange="editWf.input_schema[${i}].required=(this.value==='true')">
        <option value="true"  ${f.required?'selected':''}>Required</option>
        <option value="false" ${!f.required?'selected':''}>Optional</option>
      </select>
      <input value="${(f.allowed_values||[]).join(',')}" placeholder="allowed values (csv)" oninput="editWf.input_schema[${i}].allowed_values=this.value.split(',').map(x=>x.trim()).filter(Boolean)">
      <button class="btn btn-sm btn-danger" onclick="editWf.input_schema.splice(${i},1);renderWfModal(document.querySelector('.modal-header h3').textContent,'info')">✕</button>
    </div>`).join('')}
  </div>`;
}

function renderStepsTab(w) {
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:12px;color:var(--text2)">Define the steps for this workflow</span>
    <button class="btn btn-sm btn-primary" onclick="addStep()">+ Add Step</button>
  </div>
  ${(w.steps||[]).map((s,i) => `
  <div class="step-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:22px;height:22px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${i+1}</span>
        <span style="font-weight:500">${s.name||'Unnamed'}</span>
        <span class="badge badge-blue">${s.step_type}</span>
      </div>
      <button class="btn btn-sm btn-danger" onclick="editWf.steps.splice(${i},1);renderWfModal(document.querySelector('.modal-header h3').textContent,'steps')">Remove</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label style="font-size:11px;color:var(--text2)">Name</label>
        <input value="${s.name}" oninput="editWf.steps[${i}].name=this.value"></div>
      <div><label style="font-size:11px;color:var(--text2)">Type</label>
        <select onchange="editWf.steps[${i}].step_type=this.value;renderWfModal(document.querySelector('.modal-header h3').textContent,'steps')">
          ${['task','approval','notification'].map(t=>`<option ${s.step_type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      ${s.step_type==='approval'?`<div><label style="font-size:11px;color:var(--text2)">Assignee Email</label><input value="${(s.metadata||{}).assignee_email||''}" oninput="editWf.steps[${i}].metadata=editWf.steps[${i}].metadata||{};editWf.steps[${i}].metadata.assignee_email=this.value"></div>`:''}
      ${s.step_type==='notification'?`<div><label style="font-size:11px;color:var(--text2)">Channel</label><select onchange="editWf.steps[${i}].metadata=editWf.steps[${i}].metadata||{};editWf.steps[${i}].metadata.notification_channel=this.value">${['email','slack','sms'].map(c=>`<option ${(s.metadata||{}).notification_channel===c?'selected':''}>${c}</option>`).join('')}</select></div>`:''}
    </div>
  </div>`).join('')}
  ${!(w.steps||[]).length ? `<div class="empty" style="padding:20px">No steps yet</div>` : ''}`;
}

function renderRulesTab(w) {
  return `
  <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Rules decide the next step. Evaluated in priority order. Use <code>DEFAULT</code> as fallback.</p>
  ${(w.steps||[]).map(step => {
    const stepRules = (w.rules||[]).filter(r=>r.step_id===step.id).sort((a,b)=>a.priority-b.priority);
    return `
    <div style="border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-weight:500;font-size:13px">${step.name} <span class="badge badge-blue" style="font-size:10px">${step.step_type}</span></div>
        <button class="btn btn-sm" onclick="addRule('${step.id}')">+ Rule</button>
      </div>
      ${stepRules.map((r,ri) => `
      <div class="rule-grid">
        <input type="number" value="${r.priority}" min="1" oninput="editWf.rules.find(x=>x.id==='${r.id}').priority=parseInt(this.value)">
        <input value="${r.condition}" placeholder="condition or DEFAULT" style="font-family:monospace;font-size:12px" oninput="editWf.rules.find(x=>x.id==='${r.id}').condition=this.value">
        <select onchange="editWf.rules.find(x=>x.id==='${r.id}').next_step_id=this.value">
          <option value="">— end workflow —</option>
          ${(w.steps||[]).filter(s=>s.id!==step.id).map(s=>`<option value="${s.id}" ${r.next_step_id===s.id?'selected':''}>${s.name}</option>`).join('')}
        </select>
        <button class="btn btn-sm btn-danger" onclick="editWf.rules=editWf.rules.filter(x=>x.id!=='${r.id}');renderWfModal(document.querySelector('.modal-header h3').textContent,'rules')">✕</button>
      </div>`).join('')}
      ${!stepRules.length ? `<div style="font-size:12px;color:var(--text2);padding:4px 0">No rules — workflow ends after this step</div>` : ''}
    </div>`;
  }).join('')}`;
}

function switchTab(t) {
  renderWfModal(document.querySelector('.modal-header h3').textContent, t);
}

function addStep() {
  const id = 'step-' + Math.random().toString(36).slice(2,10);
  editWf.steps = editWf.steps || [];
  editWf.steps.push({ id, name: 'New Step', step_type: 'task', order: editWf.steps.length+1, metadata: {} });
  if (!editWf.start_step_id) editWf.start_step_id = id;
  renderWfModal(document.querySelector('.modal-header h3').textContent, 'steps');
}

function addRule(stepId) {
  editWf.rules = editWf.rules || [];
  editWf.rules.push({ id: 'r-' + Math.random().toString(36).slice(2,10), step_id: stepId, priority: editWf.rules.filter(r=>r.step_id===stepId).length+1, condition: 'DEFAULT', next_step_id: '' });
  renderWfModal(document.querySelector('.modal-header h3').textContent, 'rules');
}

async function saveWf() {
  if (!editWf.name.trim()) { alert('Workflow name is required'); return; }
  if (!(editWf.steps||[]).length) { alert('Add at least one step'); return; }
  editWf.start_step_id = editWf.steps[0].id;

  try {
    let saved;
    if (editWf.id) {
      saved = await api('PUT', '/workflows/' + editWf.id, editWf);
    } else {
      saved = await api('POST', '/workflows', editWf);
      // Save steps
      for (const s of editWf.steps) {
        await api('POST', '/workflows/' + saved.id + '/steps', s);
      }
      // Save rules
      for (const r of editWf.rules) {
        const stepId = editWf.steps.find(s => s.id === r.step_id)?.id;
        if (stepId) await api('POST', '/steps/' + stepId + '/rules', r);
      }
    }
    closeModal();
    render();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function deleteWf(id) {
  if (!confirm('Delete this workflow and all its steps?')) return;
  await api('DELETE', '/workflows/' + id);
  render();
}

// ─── EXECUTE WORKFLOW ────────────────────────────────────────────────────────
async function openExecute(id) {
  const wf = await api('GET', '/workflows/' + id);
  const fields = (wf.input_schema||[]).map(f => `
  <div class="form-group">
    <label>${f.field}${f.required ? ' *' : ''} <span style="color:var(--text3);font-weight:400">(${f.type})</span></label>
    ${f.allowed_values&&f.allowed_values.length
      ? `<select id="ei-${f.field}"><option value="">Select…</option>${f.allowed_values.map(v=>`<option>${v}</option>`).join('')}</select>`
      : `<input id="ei-${f.field}" type="${f.type==='number'?'number':'text'}" placeholder="Enter ${f.type}">`
    }
  </div>`).join('');

  openModal(`
  <div class="modal">
    <div class="modal-header"><h3>Execute: ${wf.name}</h3><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--text2);margin-bottom:16px">Provide input data. The rule engine will evaluate each step and determine the execution path.</p>
      ${fields || `<div class="empty" style="padding:20px">No input schema defined.</div>`}
      <div id="exec-result"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" id="exec-run-btn" onclick="runExecution('${id}')">▶ Run</button>
    </div>
  </div>`);
}

async function runExecution(wfId) {
  const btn = document.getElementById('exec-run-btn');
  btn.disabled = true; btn.textContent = 'Running…';
  const resDiv = document.getElementById('exec-result');

  const wf = await api('GET', '/workflows/' + wfId).catch(()=>null);
  const data = {};
  if (wf) {
    (wf.input_schema||[]).forEach(f => {
      const el = document.getElementById('ei-' + f.field);
      if (el) data[f.field] = f.type === 'number' ? (parseFloat(el.value)||0) : el.value;
    });
  }

  try {
    const exec = await api('POST', '/workflows/' + wfId + '/execute', { data, triggered_by: 'ui_user' });
    resDiv.innerHTML = `
    <div class="alert ${exec.status==='completed'?'alert-success':'alert-error'}" style="margin-top:16px">
      Execution <strong>${exec.id}</strong> — ${exec.status.toUpperCase()}
    </div>
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-label">Steps run</div><div class="sum-val">${exec.logs.length}</div></div>
      <div class="sum-card"><div class="sum-label">Status</div><div class="sum-val" style="font-size:14px">${exec.status}</div></div>
      <div class="sum-card"><div class="sum-label">Retries</div><div class="sum-val">${exec.retries}</div></div>
    </div>
    ${exec.logs.map(log => `
    <div class="exec-step ${log.status}">
      <div class="dot dot-${log.status==='completed'?'done':log.status==='failed'?'failed':'pending'}"></div>
      <div style="flex:1">
        <div style="font-weight:500;font-size:13px">${log.step_name} <span class="badge badge-blue" style="font-size:10px">${log.step_type}</span></div>
        ${log.evaluated_rules.map(r=>`
        <div class="rule-eval ${r.result?'matched':''}">
          ${r.result?'✓':'✗'} ${r.rule}
        </div>`).join('')}
        ${log.selected_next_step?`<div style="font-size:11px;color:var(--text2);margin-top:4px">→ ${log.selected_next_step}</div>`:'<div style="font-size:11px;color:var(--text2);margin-top:4px">→ End</div>'}
        ${log.error_message?`<div style="font-size:11px;color:var(--red);margin-top:3px">${log.error_message}</div>`:''}
      </div>
    </div>`).join('')}`;
    btn.disabled = false; btn.textContent = '▶ Run Again';
  } catch(e) {
    resDiv.innerHTML = `<div class="alert alert-error" style="margin-top:16px">${e.message}</div>`;
    btn.disabled = false; btn.textContent = '▶ Run';
  }
}

// ─── EXECUTIONS PAGE ─────────────────────────────────────────────────────────
async function renderExecutions(main) {
  const execs = await api('GET', '/executions');
  main.innerHTML = `
  <div class="topbar"><h2>Executions</h2><span style="font-size:12px;color:var(--text2)">${execs.length} total</span></div>
  <div class="content">
    ${execs.length === 0 ? `<div class="empty">No executions yet. Run a workflow to see results here.</div>` : ''}
    ${execs.map(e => `
    <div style="border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;background:var(--bg2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <span style="font-weight:500">${e.workflow_id}</span>
          <span class="chip" style="margin-left:6px">${e.id}</span>
        </div>
        <span class="badge ${e.status==='completed'?'badge-green':e.status==='failed'?'badge-red':'badge-amber'}">${e.status}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);display:flex;gap:14px;flex-wrap:wrap">
        <span>v${e.workflow_version}</span>
        <span>By ${e.triggered_by}</span>
        <span>${e.started_at.slice(0,10)}</span>
        <span>${e.logs.length} step(s)</span>
        ${e.retries>0?`<span style="color:var(--amber)">↻ ${e.retries} retry</span>`:''}
      </div>
      <div style="margin-top:10px">
        ${e.logs.map(log=>`
        <div class="exec-step ${log.status}" style="padding:8px 10px">
          <div class="dot dot-${log.status==='completed'?'done':'failed'}"></div>
          <div>
            <span style="font-size:12px;font-weight:500">${log.step_name}</span>
            ${log.selected_next_step?`<span style="font-size:11px;color:var(--text2);margin-left:6px">→ ${log.selected_next_step}</span>`:''}
          </div>
        </div>`).join('')}
      </div>
      ${e.status==='failed'?`<button class="btn btn-sm" style="margin-top:8px" onclick="retryExec('${e.id}')">↻ Retry</button>`:''}
    </div>`).join('')}
  </div>`;
}

async function retryExec(id) {
  await api('POST', '/executions/' + id + '/retry');
  render();
}

// ─── AUDIT LOG ───────────────────────────────────────────────────────────────
async function renderAudit(main) {
  const execs = await api('GET', '/executions');
  main.innerHTML = `
  <div class="topbar"><h2>Audit Log</h2></div>
  <div class="content">
    <table>
      <thead><tr><th>Exec ID</th><th>Workflow</th><th>Version</th><th>Status</th><th>Started By</th><th>Start Time</th><th>End Time</th></tr></thead>
      <tbody>
        ${execs.length===0?`<tr><td colspan="7"><div class="empty">No executions yet</div></td></tr>`:''}
        ${execs.map(e=>`
        <tr>
          <td><span class="chip">${e.id}</span></td>
          <td>${e.workflow_id}</td>
          <td>v${e.workflow_version}</td>
          <td><span class="badge ${e.status==='completed'?'badge-green':e.status==='failed'?'badge-red':'badge-amber'}">${e.status}</span></td>
          <td>${e.triggered_by}</td>
          <td style="font-family:monospace;font-size:12px">${e.started_at.replace('T',' ').slice(0,19)}</td>
          <td style="font-family:monospace;font-size:12px">${e.ended_at.replace('T',' ').slice(0,19)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

// ─── MODAL HELPERS ───────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

render();
</script>
